<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="hero">
            <h1 id="hero-title">Metric/Imperial Unit Conversion</h1>
            <input id="input-el">
            <button id="convert-btn">Convert</button>
        </div>
        <div id="conversion">
            <div class="conv-card">
               <div class="text-container">
                    <h1 class="conv-metric">Length (Meter/Feet)</h1>
                    <p id="length-el"></p>
               </div>
            </div>
            <div class="conv-card">
                <div class="text-container">
                    <h1 class="conv-metric">Volume (Liters/Gallons)</h1>
                    <p id="volume-el"></p>
                </div>
            </div>
            <div class="conv-card">
                <div class="text-container">
                    <h1 class="conv-metric">Mass (Kilograms/Pounds)</h1>
                    <p id="mass-el"></p>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
